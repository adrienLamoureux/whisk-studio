<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisk - AI Image Generator</title>
    <script>
      // Pre-paint theme attributes so the stored aesthetic/theme/brightness
      // apply before React mounts (ThemeProvider re-applies them on mount).
      // The aesthetic fallback here must match DEFAULT_AESTHETIC in
      // src/contexts/ThemeContext.js.
      (function () {
        try {
          var d = document.documentElement;
          var ls = window.localStorage;
          var a = ls.getItem("skr-aesthetic");
          if (a !== "sakura" && a !== "obscura") a = "sakura";
          d.setAttribute("data-aesthetic", a);
          var t = ls.getItem("skr-theme");
          if (a !== "obscura" && t && t !== "sakura") d.setAttribute("data-theme", t);
          if ((ls.getItem("skr-brightness") || "light") === "light") d.setAttribute("data-brightness", "light");
        } catch (e) {}
      })();
    </script>
    <script src="%PUBLIC_URL%/live2dcubismcore.min.js"></script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div> <!-- React App will mount here -->
</body>
</html>
